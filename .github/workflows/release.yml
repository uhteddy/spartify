name: Release

# Triggered by version tags: git tag v1.2.3 && git push --tags
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    permissions:
      contents: write # needed to create GitHub releases and upload assets

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin # Apple Silicon
          - platform: macos-latest
            target: x86_64-apple-darwin # Intel Mac
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu # Linux
          - platform: windows-latest
            target: x86_64-pc-windows-msvc # Windows

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # WebKit and other native libs required on Linux
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: bun install

      # Download the frpc binary for the target platform and place it where
      # Tauri expects the sidecar binary.
      - name: Download frpc sidecar
        shell: bash
        run: |
          FRP_VERSION="0.61.1"
          TARGET="${{ matrix.target }}"
          mkdir -p src-tauri/binaries

          if [[ "$TARGET" == *"aarch64-apple-darwin"* ]]; then
            ARCHIVE="frp_${FRP_VERSION}_darwin_arm64.tar.gz"
            BIN="frpc"
          elif [[ "$TARGET" == *"x86_64-apple-darwin"* ]]; then
            ARCHIVE="frp_${FRP_VERSION}_darwin_amd64.tar.gz"
            BIN="frpc"
          elif [[ "$TARGET" == *"x86_64-unknown-linux-gnu"* ]]; then
            ARCHIVE="frp_${FRP_VERSION}_linux_amd64.tar.gz"
            BIN="frpc"
          elif [[ "$TARGET" == *"x86_64-pc-windows-msvc"* ]]; then
            ARCHIVE="frp_${FRP_VERSION}_windows_amd64.zip"
            BIN="frpc.exe"
          fi

          curl -sL "https://github.com/fatedier/frp/releases/download/v${FRP_VERSION}/${ARCHIVE}" -o frp.tar.gz

          if [[ "$TARGET" == *windows* ]]; then
            unzip -q frp.tar.gz
            EXTRACTED_DIR="frp_${FRP_VERSION}_windows_amd64"
            cp "${EXTRACTED_DIR}/frpc.exe" "src-tauri/binaries/frpc-${TARGET}.exe"
          else
            tar -xzf frp.tar.gz
            EXTRACTED_DIR="${ARCHIVE%.tar.gz}"
            cp "${EXTRACTED_DIR}/frpc" "src-tauri/binaries/frpc-${TARGET}"
            chmod +x "src-tauri/binaries/frpc-${TARGET}"
          fi

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Spartify ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install Spartify."
          releaseDraft: true # publish manually after all platform builds finish
          prerelease: false
          args: --target ${{ matrix.target }}
